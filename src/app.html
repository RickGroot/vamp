<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#1c1a1f" />

		<title>Vamp — Chord Sketchpad & Improv Trainer</title>
		<meta
			name="description"
			content="Sketch chord progressions and loop backing tracks to improvise over — voicings, grooves, real drums, a drone and a rhythm-section mixer. Local-first, installable, works offline."
		/>

		<link rel="icon" href="%sveltekit.assets%/vamp-icon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon-48.png" sizes="48x48" type="image/png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<!-- Link previews (Open Graph + Twitter). Absolute URLs are required by
		     scrapers; hardcoded to the GitHub Pages origin (update if the host
		     changes). The page is prerendered, so these ship in the static HTML. -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="Vamp" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:url" content="https://rickgroot.github.io/vamp/" />
		<meta property="og:title" content="Vamp — Chord Sketchpad & Improv Trainer" />
		<meta
			property="og:description"
			content="Sketch chord progressions and loop backing tracks to improvise over — voicings, grooves, real drums, a drone and a rhythm-section mixer. Local-first, works offline."
		/>
		<meta property="og:image" content="https://rickgroot.github.io/vamp/og-image.png" />
		<meta property="og:image:type" content="image/png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="The Vamp logo — a gradient V above the wordmark VAMP." />

		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="Vamp — Chord Sketchpad & Improv Trainer" />
		<meta
			name="twitter:description"
			content="Sketch chord progressions and loop backing tracks to improvise over. Local-first, works offline."
		/>
		<meta name="twitter:image" content="https://rickgroot.github.io/vamp/og-image.png" />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
